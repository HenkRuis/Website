<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Henk Ruis</title>
    <style>
      :root { --bg: #0f172a; --card: #0b1220; --accent: #60a5fa; --text: #e6eef8; }
      html,body { height:100%; margin:0; font-family:Inter, system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial; background:linear-gradient(180deg,var(--bg), #071024); color:var(--text); }
      .wrap { min-height:100%; display:flex; align-items:center; justify-content:center; padding:2rem; }
      .card { background:rgba(255,255,255,0.03); border:1px solid rgba(255,255,255,0.04); padding:3rem 4rem; border-radius:12px; text-align:center; box-shadow:0 6px 30px rgba(2,6,23,0.6); }
      h1 { margin:0; font-size:3.25rem; letter-spacing: -0.02em; color:var(--text); }
      p { margin:.75rem 0 0; color:rgba(230,238,248,0.8); }
      @media (max-width:520px){ h1{font-size:2rem} .card{padding:2rem} }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="card" role="main">
        <h1>Henk Ruis</h1>
        <p>Welcome — this is a simple landing page.</p>
      </div>
    </div>
  </body>
</html>
